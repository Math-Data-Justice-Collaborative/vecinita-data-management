services:
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_PROXY_URL=http://localhost:8000
    depends_on:
      - proxy

  proxy:
    build:
      context: ..
      dockerfile: infra/docker/proxy.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - SCRAPER_SERVICE_URL=http://scraper-service:8001
      - MODEL_SERVICE_URL=http://model-service:8002
      - EMBEDDING_SERVICE_URL=http://embedding-service:8003
      - CORS_ORIGINS=["http://localhost:3000"]
    depends_on:
      - scraper-service
      - model-service
      - embedding-service

  scraper-service:
    build:
      context: ..
      dockerfile: infra/docker/scraper.Dockerfile
    ports:
      - "8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - MODEL_SERVICE_URL=http://model-service:8002
      - EMBEDDING_SERVICE_URL=http://embedding-service:8003
    depends_on:
      - model-service
      - embedding-service

  model-service:
    build:
      context: ..
      dockerfile: infra/docker/model.Dockerfile
    ports:
      - "8002:8002"
    environment:
      - HOST=0.0.0.0
      - PORT=8002

  embedding-service:
    build:
      context: ..
      dockerfile: infra/docker/embedding.Dockerfile
    ports:
      - "8003:8003"
    environment:
      - HOST=0.0.0.0
      - PORT=8003
