[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shared-logging"
version = "0.1.0"
description = "Shared structured logging utilities for the Vecinita platform"
requires-python = ">=3.11"
dependencies = [
    "python-json-logger>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["shared_logging"]

[tool.ruff]
line-length = 100
