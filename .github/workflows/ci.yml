name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: data-management-api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-layout:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify submodule checkout
        run: git submodule status --recursive

      - name: Validate repository layout and package metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          required_paths = [
              Path('apps/frontend'),
              Path('apps/backend/proxy'),
              Path('apps/backend/model-service'),
              Path('apps/backend/scraper-service'),
              Path('apps/backend/embedding-service'),
              Path('infra/docker-compose.yml'),
              Path('packages/shared-config/pyproject.toml'),
              Path('packages/shared-logging/pyproject.toml'),
              Path('packages/shared-schemas/pyproject.toml'),
              Path('packages/service-clients/pyproject.toml'),
          ]

          missing = [str(path) for path in required_paths if not path.exists()]
          if missing:
              raise SystemExit(f'Missing required paths: {missing}')

          for pyproject in Path('packages').glob('*/pyproject.toml'):
              with pyproject.open('rb') as handle:
                  tomllib.load(handle)

          print('Repository layout and package metadata validated.')
          PY